<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2c3e50">AI 记忆系统架构</text>
  
  <!-- 短期记忆层 -->
  <g id="short-term">
    <rect x="200" y="120" width="800" height="120" rx="10" fill="#3498db" opacity="0.9"/>
    <text x="600" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">短期记忆</text>
    <text x="600" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">Context Window | 会话历史 | 工具调用</text>
    <text x="600" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">⏱️ 临时性 | 📝 容量限制 | 🔄 会话结束即丢失</text>
  </g>
  
  <!-- 箭头 1 -->
  <polygon points="600,250 590,280 610,280" fill="#7f8c8d"/>
  <line x1="600" y1="250" x2="600" y2="280" stroke="#7f8c8d" stroke-width="3"/>
  
  <!-- 中期记忆层 -->
  <g id="medium-term">
    <rect x="200" y="290" width="800" height="120" rx="10" fill="#2ecc71" opacity="0.9"/>
    <text x="600" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">中期记忆</text>
    <text x="600" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">文件系统 | MEMORY.md | 每日笔记</text>
    <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">✅ 持久化 | ✅ 可编辑 | ✅ 版本控制</text>
  </g>
  
  <!-- 箭头 2 -->
  <polygon points="600,420 590,450 610,450" fill="#7f8c8d"/>
  <line x1="600" y1="420" x2="600" y2="450" stroke="#7f8c8d" stroke-width="3"/>
  
  <!-- 长期记忆层 -->
  <g id="long-term">
    <rect x="200" y="460" width="800" height="120" rx="10" fill="#9b59b6" opacity="0.9"/>
    <text x="600" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">长期记忆</text>
    <text x="600" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">GitHub 仓库 | Obsidian | 云端备份</text>
    <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">🌐 版本控制 | 🔒 私有仓库 | 📊 可搜索</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">三层架构确保信息的有效存储、检索和持久化</text>
  
  <!-- 图例 -->
  <g id="legend">
    <rect x="50" y="700" width="20" height="20" fill="#3498db" opacity="0.9"/>
    <text x="80" y="715" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">短期 (会话)</text>
    
    <rect x="200" y="700" width="20" height="20" fill="#2ecc71" opacity="0.9"/>
    <text x="230" y="715" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">中期 (文件)</text>
    
    <rect x="350" y="700" width="20" height="20" fill="#9b59b6" opacity="0.9"/>
    <text x="380" y="715" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">长期 (GitHub)</text>
  </g>
</svg>
