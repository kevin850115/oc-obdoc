<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="600" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2c3e50">记忆工作流程</text>
  
  <!-- 流程节点 -->
  <g id="step1">
    <circle cx="150" cy="300" r="80" fill="#e74c3c" opacity="0.9"/>
    <text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">用户</text>
    <text x="150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">对话</text>
  </g>
  
  <!-- 箭头 1 -->
  <line x1="230" y1="300" x2="320" y2="300" stroke="#7f8c8d" stroke-width="5"/>
  <polygon points="320,290 350,300 320,310" fill="#7f8c8d"/>
  
  <g id="step2">
    <circle cx="400" cy="300" r="80" fill="#3498db" opacity="0.9"/>
    <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">短期记忆</text>
    <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">Context</text>
  </g>
  
  <!-- 箭头 2 -->
  <line x1="480" y1="300" x2="570" y2="300" stroke="#7f8c8d" stroke-width="5"/>
  <polygon points="570,290 600,300 570,310" fill="#7f8c8d"/>
  <text x="525" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">重要信息</text>
  
  <g id="step3">
    <circle cx="650" cy="300" r="80" fill="#2ecc71" opacity="0.9"/>
    <text x="650" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">中期记忆</text>
    <text x="650" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">文件系统</text>
  </g>
  
  <!-- 箭头 3 -->
  <line x1="730" y1="300" x2="820" y2="300" stroke="#7f8c8d" stroke-width="5"/>
  <polygon points="820,290 850,300 820,310" fill="#7f8c8d"/>
  <text x="775" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">知识/配置</text>
  
  <g id="step4">
    <circle cx="900" cy="300" r="80" fill="#9b59b6" opacity="0.9"/>
    <text x="900" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">长期记忆</text>
    <text x="900" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">知识库</text>
  </g>
  
  <!-- 箭头 4 -->
  <line x1="980" y1="300" x2="1070" y2="300" stroke="#7f8c8d" stroke-width="5"/>
  <polygon points="1070,290 1100,300 1070,310" fill="#7f8c8d"/>
  
  <g id="step5">
    <circle cx="1150" cy="300" r="70" fill="#f39c12" opacity="0.9"/>
    <text x="1150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">GitHub</text>
    <text x="1150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">云端备份</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="600" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d">信息从短期记忆流向长期记忆，重要信息被持久化保存</text>
  
  <!-- 图例 -->
  <g id="legend">
    <circle cx="100" cy="520" r="15" fill="#e74c3c" opacity="0.9"/>
    <text x="130" y="525" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">输入</text>
    
    <circle cx="250" cy="520" r="15" fill="#3498db" opacity="0.9"/>
    <text x="280" y="525" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">处理</text>
    
    <circle cx="400" cy="520" r="15" fill="#2ecc71" opacity="0.9"/>
    <text x="430" y="525" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">存储</text>
    
    <circle cx="550" cy="520" r="15" fill="#9b59b6" opacity="0.9"/>
    <text x="580" y="525" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">归档</text>
    
    <circle cx="700" cy="520" r="15" fill="#f39c12" opacity="0.9"/>
    <text x="730" y="525" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">备份</text>
  </g>
</svg>
